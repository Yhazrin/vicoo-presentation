<div data-composition-id="s3-leader">
  <style>
    .s3-canvas { width: 1920px; height: 1080px; background: #F5F0E8; position: relative; overflow: hidden; font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; }
    .s3-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 10; }
    .s3-intro { font-size: 11px; font-weight: 700; letter-spacing: 0.4em; color: #B8B2A7; text-transform: uppercase; opacity: 0; }
    .s3-avatar { width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); border: 1px solid rgba(212,207,196,0.5); box-shadow: 0 8px 40px rgba(26,26,22,0.10); display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.4); }
    .s3-avatar-initials { font-size: 44px; font-weight: 700; color: #1A1A16; }
    .s3-name { font-size: 52px; font-weight: 700; color: #1A1A16; letter-spacing: 0.05em; opacity: 0; transform: translateY(25px); }
    .s3-role { font-size: 14px; font-weight: 600; letter-spacing: 0.25em; color: #8B3A2A; text-transform: uppercase; opacity: 0; }
    .s3-team { font-size: 13px; color: #4A4540; letter-spacing: 0.08em; opacity: 0; margin-top: 8px; }
    .s3-team span { color: #8B3A2A; font-weight: 600; }
  </style>
  <div class="s3-canvas">
    <div class="s3-content">
      <div class="s3-intro">Presenting</div>
      <div class="s3-avatar"><div class="s3-avatar-initials">王</div></div>
      <h2 class="s3-name">Wang Jundi</h2>
      <div class="s3-role">Project Leader · VICOO</div>
      <div class="s3-team">Group 7 · <span>Six</span> Members · One Vision</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function(){
    var tl = gsap.timeline({ paused: true });
    tl.to('.s3-intro', { opacity: 1, duration: 0.6 }, 0.5);
    tl.to('.s3-avatar', { opacity: 1, scale: 1, duration: 0.8, ease: 'power2.out' }, 1.2);
    tl.to('.s3-name', { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }, 1.8);
    tl.to('.s3-role', { opacity: 1, duration: 0.6 }, 2.4);
    tl.to('.s3-team', { opacity: 1, duration: 0.6 }, 2.8);
    window.__timelines = window.__timelines || {};
    window.__timelines['s3-leader'] = tl;
  })();
  </script>
</div>
