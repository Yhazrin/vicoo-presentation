<div data-composition-id="s23-confidence">
  <style>
    .s23-canvas { width: 1920px; height: 1080px; background: #F5F0E8; position: relative; overflow: hidden; font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; }

    .s23-author { display: flex; align-items: center; gap: 16px; margin-top: 48px; opacity: 0; }
    .s23-avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); border: 1px solid rgba(212,207,196,0.5); box-shadow: 0 8px 40px rgba(26,26,22,0.10); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #1A1A16; }
    .s23-name { text-align: left; }
    .s23-name strong { display: block; font-size: 18px; color: #1A1A16; }
