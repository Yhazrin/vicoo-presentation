<template id="s2-goal-template">
<div data-composition-id="s2-goal" data-width="1920" data-height="1080" data-duration="5" data-start="0">
  <div class="s2-canvas">
    <!-- Brand Header -->
    <div class="brand-header" style="opacity: 0;">
      <div class="brand-header-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="#F5F0E8" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" fill="#F5F0E8"/>
        </svg>
      </div>
      <span class="brand-header-text">VICOO</span>
      <div class="brand-header-divider"></div>
      <span class="brand-header-partner">× UNIQLO</span>
    </div>

    <div class="s2-content">
      <div class="s2-label">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="2" fill="currentColor"/></svg>
        Our Goal
      </div>
      <blockquote class="s2-quote">
        Our goal is to <span>leverage the universal appeal</span> of Uniqlo's products to <span>amplify the visibility and impact</span> of children's creativity worldwide.
      </blockquote>
      <div class="s2-attribution">VICOO × Uniqlo Partnership</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function(){
    var tl = gsap.timeline({ paused: true });

    // Brand header
    tl.to('.brand-header', { opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.3);

    // Quote entrance — gentle, editorial
    tl.to('.s2-label', { opacity: 1, duration: 0.7, ease: 'power2.out' }, 0.6);
    tl.to('.s2-quote', { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out' }, 0.9);
    tl.to('.s2-attribution', { opacity: 1, duration: 0.7 }, 2.2);

    // Gentle fade out
    tl.to('.s2-content', { opacity: 0, y: -16, duration: 0.6 }, 4.5);

    window.__timelines = window.__timelines || {};
    window.__timelines['s2-goal'] = tl;
  })();
  </script>
</div>
</template>
