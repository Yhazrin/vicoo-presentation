<div data-composition-id="s0-cover">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

    .s0-canvas { width: 1920px; height: 1080px; background: #F5F0E8; position: relative; overflow: hidden; font-family: "Inter", -apple-system, sans-serif; }

    /* Top brand header */
    .s0-brand-header { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; padding: 10px 20px 10px 14px; background: rgba(255,255,255,0.82); backdrop-filter: blur(20px); border: 1px solid rgba(212,207,196,0.55); border-radius: 9999px; box-shadow: 0 4px 24px rgba(26,26,22,0.06); z-index: 20; }
    .s0-logo-box { width: 34px; height: 34px; border-radius: 8px; background: #1A1A16; display: flex; align-items: center; justify-content: center; }
    .s0-logo-text { font-size: 13px; font-weight: 800; color: #F5F0E8; letter-spacing: 0.02em; font-family: "Inter", sans-serif; }
    .s0-brand-name { font-size: 13px; font-weight: 700; color: #1A1A16; letter-spacing: 0.12em; font-family: "Inter", sans-serif; }

    /* Main brand lockup — flex centered */
    .s0-brand-lockup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      display: flex;
      align-items: center;
      gap: 0;
    }
    .s0-uniqlo-wrap {
      display: flex;
      align-items: center;
      opacity: 0;
    }
    .s0-uniqlo { width: 160px; height: 160px; object-fit: contain; display: block; }
    .s0-x-wrap {
      display: flex;
      align-items: center;
      opacity: 0;
    }
    .s0-x {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 72px;
      font-weight: 400;
      color: #1A1A16;
      line-height: 1;
      margin: 0 -2px;
      user-select: none;
    }
    .s0-vicoo-wrap {
      display: flex;
      align-items: center;
      opacity: 0;
    }
    .s0-vicoo {
      font-family: "Playfair Display", Georgia, serif;
      font-style: italic;
      font-weight: 800;
      font-size: 108px;
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: #1A1A16;
      user-select: none;
    }

    /* Vertical divider */
    .s0-divider { position: absolute; top: 620px; left: 50%; transform: translateX(-50%); width: 1px; height: 72px; background: #D4CFC4; opacity: 0; }

    /* Bottom meta */
    .s0-meta { position: absolute; top: 720px; left: 50%; transform: translateX(-50%); text-align: center; white-space: nowrap; opacity: 0; }
    .s0-tagline { font-family: "IBM Plex Mono", monospace; font-size: 13px; font-weight: 500; color: #8A857E; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
    .s0-group { font-family: "Inter", sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #1A1A16; margin-bottom: 14px; }
    .s0-group .sixseven { font-weight: 500; color: #8A857E; }
    .s0-members { font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 400; color: #8A857E; letter-spacing: 0.08em; }
  </style>
  <div class="s0-canvas">
    <!-- Brand Header -->
    <div class="s0-brand-header">
      <div class="s0-logo-box"><span class="s0-logo-text">V</span></div>
      <span class="s0-brand-name">VICOO</span>
    </div>

    <!-- Brand Lockup -->
    <div class="s0-brand-lockup">
      <div class="s0-uniqlo-wrap">
        <img class="s0-uniqlo" src="assets/uniqlo-logo.png" alt="UNIQLO">
      </div>
      <div class="s0-x-wrap">
        <span class="s0-x">×</span>
      </div>
      <div class="s0-vicoo-wrap">
        <span class="s0-vicoo">VICOO</span>
      </div>
    </div>

    <div class="s0-divider"></div>

    <div class="s0-meta">
      <div class="s0-tagline">Where Little Hands Shape the Future of Fashion</div>
      <div class="s0-group">group 7 <span class="sixseven">SIXSEVEN</span></div>
      <div class="s0-members">Wang Jundi · Yang Haoze · Huang Tian · Li Jinhao · Liu Honghao · Ma Qingchuan</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function(){
    var tl = gsap.timeline({ paused: true });
    tl.to('.s0-brand-header', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 0.2);
    tl.to('.s0-uniqlo-wrap', { opacity: 1, duration: 1.0, ease: 'power2.out' }, 0.5);
    tl.to('.s0-x-wrap', { opacity: 1, duration: 1.0, ease: 'power2.out' }, 0.6);
    tl.to('.s0-vicoo-wrap', { opacity: 1, duration: 1.0, ease: 'power2.out' }, 0.7);
    tl.to('.s0-divider', { opacity: 1, duration: 0.8, ease: 'power2.out' }, 1.6);
    tl.to('.s0-meta', { opacity: 1, duration: 0.9, ease: 'power2.out' }, 2.0);
    window.__timelines = window.__timelines || {};
    window.__timelines['s0-cover'] = tl;
  })();
  </script>
</div>
